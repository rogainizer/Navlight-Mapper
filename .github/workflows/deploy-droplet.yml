name: Deploy To Droplet

on:
  workflow_dispatch:

concurrency:
  group: deploy-planner-rogainizer
  cancel-in-progress: false

env:
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/navlight-mapper-frontend
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/navlight-mapper-server
  APP_DOMAIN: planner.rogainizer.com
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/navlight-mapper' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - build-and-push
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload deploy bundle to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          source: deploy
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      - name: Deploy on droplet over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          APP_DOMAIN: ${{ env.APP_DOMAIN }}
          APP_IMAGE_TAG: ${{ github.sha }}
          FRONTEND_IMAGE: ${{ env.FRONTEND_IMAGE }}
          SERVER_IMAGE: ${{ env.SERVER_IMAGE }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
          CADDY_DOCKER_NETWORK: ${{ secrets.CADDY_DOCKER_NETWORK }}
          UPLOADS_VOLUME_SOURCE: ${{ secrets.UPLOADS_VOLUME_SOURCE }}
          SERVER_UPLOAD_DIR: ${{ secrets.SERVER_UPLOAD_DIR }}
          GHCR_READ_USER: ${{ secrets.GHCR_READ_USER }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          envs: DEPLOY_PATH,APP_DOMAIN,APP_IMAGE_TAG,FRONTEND_IMAGE,SERVER_IMAGE,DB_HOST,DB_PORT,DB_USER,DB_PASSWORD,DB_NAME,CADDY_DOCKER_NETWORK,UPLOADS_VOLUME_SOURCE,SERVER_UPLOAD_DIR,GHCR_READ_USER,GHCR_READ_TOKEN
          script: |
            set -euo pipefail

            mkdir -p "$DEPLOY_PATH"
            mkdir -p "${UPLOADS_VOLUME_SOURCE:-/opt/navlight-mapper/uploads}"

            cat > "$DEPLOY_PATH/.env" <<EOF
            APP_DOMAIN=${APP_DOMAIN}
            APP_IMAGE_TAG=${APP_IMAGE_TAG}
            FRONTEND_IMAGE=${FRONTEND_IMAGE}
            SERVER_IMAGE=${SERVER_IMAGE}
            DB_HOST=${DB_HOST}
            DB_PORT=${DB_PORT:-3306}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            DB_NAME=${DB_NAME}
            CADDY_DOCKER_NETWORK=${CADDY_DOCKER_NETWORK:-caddy}
            UPLOADS_VOLUME_SOURCE=${UPLOADS_VOLUME_SOURCE:-/opt/navlight-mapper/uploads}
            SERVER_UPLOAD_DIR=${SERVER_UPLOAD_DIR:-/app/uploads}
            APP_STACK_NETWORK=navlight-mapper-app
            EOF

            bash "$DEPLOY_PATH/deploy/scripts/deploy-on-droplet.sh" "$DEPLOY_PATH"
