services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: navlight_mapper
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  server:
    build:
      context: ./server
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: navlight_mapper
      UPLOAD_DIR: ${SERVER_UPLOAD_DIR:-/app/uploads}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ${UPLOADS_VOLUME_SOURCE:-uploads-data}:${SERVER_UPLOAD_DIR:-/app/uploads}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  mysql-data:
  uploads-data:
